name: flutter_ui
description: Developer-first composable Flutter UI system built on typed tokens.
version: 0.1.0
homepage: https://github.com/abdelrzz9/FluxUI
repository: https://github.com/abdelrzz9/FluxUI
issue_tracker: https://github.com/abdelrzz9/FluxUI/issues

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_ui_tokens:
    version: ^0.1.0
  flutter_ui_utils:
    version: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
