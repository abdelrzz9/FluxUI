name: publish-dry-run

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          channel: stable
          cache: true

      - name: Install workspace dependencies
        run: dart pub get

      - name: Bootstrap workspace
        run: dart run melos bootstrap

      - name: Flutter package dry-run publish
        run: dart run melos run publish:dry-run:flutter

      - name: CLI dry-run publish
        run: dart run melos run publish:dry-run:cli
